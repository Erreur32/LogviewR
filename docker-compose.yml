# ===========================================
# LogviewR - Docker Compose (Production)
# ===========================================
#
# Usage:
#   docker compose up -d
#   docker compose pull && docker compose up -d   # update to latest
#
# IMPORTANT: Create a .env file with JWT_SECRET before starting:
#   echo "JWT_SECRET=$(openssl rand -base64 32)" > .env
#
# ── Port modes ──────────────────────────────────────────────────────────────
#
#  MODE A — Standard (bridge network, no firewall tabs)
#    ports:
#      - "${DASHBOARD_PORT:-7500}:3000"
#    environment:
#      DASHBOARD_PORT: ${DASHBOARD_PORT:-7500}   # host port exposed by Docker
#
#  MODE B — Firewall tabs (IPTables / IPSet / NFTables) + reverse proxy
#    network_mode: host                           # shares host network namespace
#    cap_add: [NET_ADMIN]                         # required for netfilter
#    environment:
#      PORT: ${PORT:-7500}                        # direct listen port on host
#    → reverse proxy target: 127.0.0.1:7500
#    → to change port: set PORT=8080 in .env and update reverse proxy
#    ⚠️  network_mode: host is INCOMPATIBLE with ports: — remove ports: section
#
# ── Reverse proxy examples (MODE B) ─────────────────────────────────────────
#   Nginx Proxy Manager : Forward Hostname = 127.0.0.1 / Port = 7500
#   Nginx manual        : proxy_pass http://127.0.0.1:7500;
#   Caddy               : reverse_proxy 127.0.0.1:7500
#   Traefik             : url = "http://127.0.0.1:7500"
# ─────────────────────────────────────────────────────────────────────────────

services:
  logviewr:
    image: ghcr.io/erreur32/logviewr:latest
    container_name: logviewr
    restart: unless-stopped

    # ── MODE A — Standard (default) ──────────────────────────────────────────
    # Direct port mapping: host port → container port 3000
    # Comment out and use MODE B below to enable firewall tabs
    ports:
      - "${DASHBOARD_PORT:-7500}:3000"

    # ── MODE B — Firewall tabs (IPTables / IPSet / NFTables) ─────────────────
    # Uncomment the block below AND remove the ports: section above
    #
    # network_mode: host          # shares host network namespace (required)
    # cap_add:
    #   - NET_ADMIN               # required for netfilter kernel operations

    environment:
      # ── Required ────────────────────────────────────────────────────────────
      # JWT secret — generate once and store in .env:
      #   echo "JWT_SECRET=$(openssl rand -base64 32)" >> .env
      JWT_SECRET: ${JWT_SECRET}

      # ── Port (choose one based on mode) ─────────────────────────────────────
      # MODE A — must match the host port in ports: above
      DASHBOARD_PORT: ${DASHBOARD_PORT:-7500}
      # MODE B — direct listen port when using network_mode: host
      # Uncomment and set PORT in .env to change (default 7500):
      # PORT: ${PORT:-7500}

      # ── Optional ─────────────────────────────────────────────────────────────
      # Host machine LAN IP — shown in the dashboard banner
      # Without this, the banner shows the Docker gateway IP, not your host IP
      # Example: HOST_IP=192.168.1.100
      HOST_IP: ${HOST_IP:-}

      # External config file path (optional, for plugin config persistence)
      CONFIG_FILE_PATH: ${CONFIG_FILE_PATH:-/app/config/logviewr.conf}

      # Path where the host filesystem is mounted inside the container
      HOST_ROOT_PATH: ${HOST_ROOT_PATH:-/host}

      # Public URL — uncomment if accessing via domain name / reverse proxy
      # PUBLIC_URL: https://dashboard.example.com

    # Add container user to host groups for file/socket access
    group_add:
      - "${ADM_GID:-4}"           # adm group (GID 4) — read /var/log files
      # Uncomment if using Fail2ban plugin (run setup-fail2ban-access.sh first):
      # - "${FAIL2BAN_GID}"       # fail2ban group — socket access (set by setup script)

    volumes:
      # Persistent data (SQLite DB + app config)
      - ./data:/app/data

      # Fail2ban Unix socket — required for ban/unban commands
      # Run the setup script once before starting (see README Step 2):
      #   curl -fsSL https://raw.githubusercontent.com/Erreur32/LogviewR/main/scripts/setup-fail2ban-access.sh | sudo bash
      # Uncomment if fail2ban is installed on the host:
      # - /var/run/fail2ban/fail2ban.sock:/var/run/fail2ban/fail2ban.sock

      # Host filesystem (read-only) — provides access to logs, hostname, disk info
      # ⚠️  :ro is recommended (more secure — prevents container writes to host filesystem)
      #     However, :ro disables the Fail2ban SQLite VACUUM feature (read-only FS).
      #     To enable VACUUM, uncomment the type:bind block below.
      #     Note: a simple "- /var/lib/fail2ban:/host/var/lib/fail2ban" does NOT work
      #     because Docker cannot override a :ro subdirectory with a rw short-form mount.
      #     The long-form bind with propagation: shared is required.
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

      # Optional: enable Fail2ban SQLite VACUUM (rw override — requires long-form syntax)
      # - type: bind
      #   source: /var/lib/fail2ban
      #   target: /host/var/lib/fail2ban
      #   bind:
      #     propagation: shared

      # Optional: enable Fail2ban config file editing from the UI (jail.local / fail2ban.local)
      # Run setup script once (sets group-write on config files):
      #   curl -fsSL https://raw.githubusercontent.com/Erreur32/LogviewR/main/scripts/setup-fail2ban-access.sh | sudo bash
      # Same constraint as VACUUM above: long-form bind required to override the :ro root mount.
      # - type: bind
      #   source: /etc/fail2ban
      #   target: /host/etc/fail2ban
      #   bind:
      #     propagation: shared

      # Optional: mount specific log directories for direct access (without /host/ prefix)
      # - /var/log/nginx:/var/log/nginx:ro
      # - /var/log/apache2:/var/log/apache2:ro

      # ── Fail2ban running INSIDE the container (no fail2ban on the host) ───────
      # If fail2ban is not installed on the host (fail2ban-client on host says
      # "Could not find server"), it runs inside the container instead.
      # In that case, replace the socket mount above with these three mounts so
      # fail2ban can find its log files and config at the standard paths:
      #
      # 1. Log files — fail2ban reads /var/log/auth.log etc. directly
      # - /var/log:/var/log:ro
      #
      # 2. Fail2ban config — shared with host so LogviewR edits take effect
      # - /etc/fail2ban:/etc/fail2ban
      #
      # 3. Fail2ban database — rw so fail2ban can write bans
      # - type: bind
      #   source: /var/lib/fail2ban
      #   target: /var/lib/fail2ban
      #   bind:
      #     propagation: shared
      #
      # Remove the socket mount (/var/run/fail2ban/fail2ban.sock) when using this mode.

    # Health check — adjust port if using MODE B with a custom PORT
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Prevent privilege escalation — safe in MODE A (bridge, no firewall tabs)
    # ⚠️ Remove or comment out in MODE B (network_mode: host + firewall tabs)
    #    sudo cannot run with this flag set, breaking iptables/ipset/nft commands
    security_opt:
      - no-new-privileges:true

    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M
