# ===========================================
# LogviewR - Docker Compose (Standard)
# ===========================================
#
# Log viewer for Apache, Nginx, NPM and system logs.
# No extra setup needed — just start and view your logs.
#
# Usage:
#   docker compose up -d
#   docker compose pull && docker compose up -d   # update to latest
#
# For Fail2ban + Firewall management, use docker-compose.fail2ban.yml instead:
#   wget -O docker-compose.yml https://raw.githubusercontent.com/Erreur32/LogviewR/main/docker-compose.fail2ban.yml
#
# ===========================================

services:
  logviewr:
    image: ghcr.io/erreur32/logviewr:latest
    container_name: logviewr
    restart: unless-stopped

    ports:
      - "${DASHBOARD_PORT:-7500}:3000"

    environment:
      JWT_SECRET: ${JWT_SECRET}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-7500}
      HOST_IP: ${HOST_IP:-}
      HOST_ROOT_PATH: ${HOST_ROOT_PATH:-/host}
      CONFIG_FILE_PATH: ${CONFIG_FILE_PATH:-/app/config/logviewr.conf}
      # PUBLIC_URL: https://dashboard.example.com

    group_add:
      - "${ADM_GID:-4}"           # adm group (GID 4) — read /var/log files

    volumes:
      - ./data:/app/data          # persistent data (SQLite DB + config)
      - /:/host:ro                # host filesystem (read-only)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    security_opt:
      - no-new-privileges:true
