# ===========================================
# LogviewR - Docker Compose (Development with hot reload)
# ===========================================
#
# Builds the image locally with hot reload enabled.
# Source file changes automatically trigger recompilation and browser refresh.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   # Use a separate project name to avoid stopping the production container:
#   docker compose -f docker-compose.dev.yml -p logviewr-dev up -d --build
#
# Environment variables:
#   DASHBOARD_PORT - Vite dev server port (default: 3777)
#   SERVER_PORT    - Backend API port (default: 3779)
#   JWT_SECRET     - JWT secret for authentication

services:
  logviewr-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: logviewr-dev
    ports:
      - "${DASHBOARD_PORT:-3777}:5174"  # Vite dev server (frontend)
      - "${SERVER_PORT:-3779}:3003"     # API server (backend)
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/app/data/dashboard.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - VITE_PORT=5174
      - PORT=3003
      - SERVER_PORT=${SERVER_PORT:-3779}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-3777}
      - HOST_ROOT_PATH=${HOST_ROOT_PATH:-/host}
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Preserve container's node_modules
      - /app/node_modules
      - ./data:/app/data
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # Host logs for log viewer functionality
      - /var/log:/host/logs:ro
      - /var/log/apache2:/var/log/apache2:ro
      - /var/log/npm:/var/log/npm:ro
    restart: unless-stopped
