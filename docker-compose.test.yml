# ===========================================
# LogviewR - Docker Compose (Test / Local build with firewall)
# ===========================================
#
# Builds the image locally and enables firewall tab support (IPTables / IPSet / NFTables).
# Uses network_mode: host so the container sees the host's netfilter rules.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   docker compose -f docker-compose.test.yml logs -f
#   docker compose -f docker-compose.test.yml down
#
# App listens directly on the host port (no port mapping with network_mode: host):
#   http://HOST_IP:7502
#
# ⚠️  network_mode: host is INCOMPATIBLE with ports: — use PORT= instead.

name: logviewr-test

services:
  logviewr-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logviewr-test
    restart: "no"

    # Share host network namespace — required to see host iptables/ipset/nft rules
    network_mode: host

    # NET_ADMIN required to read/write netfilter (iptables/ipset/nft) from the container
    cap_add:
      - NET_ADMIN

    environment:
      # Listening port (= host port because network_mode: host)
      PORT: 7502
      DASHBOARD_PORT: 7502
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-me}
      HOST_IP: ${HOST_IP:-}
      CONFIG_FILE_PATH: ${CONFIG_FILE_PATH:-/app/config/logviewr.conf}
      HOST_ROOT_PATH: /host

    group_add:
      - "${ADM_GID:-4}"           # adm group — read host log files
      - "${FAIL2BAN_GID:-}"       # fail2ban group — socket access (set by setup script)

    volumes:
      # Isolated data directory — does not share with production
      - ./data-test:/app/data
      # Fail2ban socket (read-write — required for ban/unban commands)
      # PREREQUISITE: run the host setup script once before starting:
      #   sudo bash <(curl -fsSL https://raw.githubusercontent.com/Erreur32/LogviewR/main/scripts/setup-fail2ban-access.sh)
      - /var/run/fail2ban/fail2ban.sock:/var/run/fail2ban/fail2ban.sock
      # Host filesystem (read-only) for logs and system metrics
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

    # security_opt: no-new-privileges:true
    # ⚠️ Incompatible with firewall tabs — sudo cannot elevate with this flag set (breaks iptables/ipset/nft)

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7502/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
